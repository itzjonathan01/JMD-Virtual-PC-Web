<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>JMD Virtual PC Web 2.0</title>
<style>
:root{
  --bg:#070b12; --panel:#101827; --panel2:#0b1020; --panel3:#17233a;
  --text:#f5f7ff; --muted:#cbd5e1; --accent:#42c8ff; --good:#44ff77;
  --bad:#ff4d5e; --warn:#ffe95c; --btn:#17233a; --btn2:#253858;
  --pixel:16px;
}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,Arial,sans-serif;overflow:hidden}
button,input,textarea,select{font-family:inherit}
#app{height:100vh;display:flex;flex-direction:column;background:linear-gradient(135deg,#05070b,#0b1020 60%,#071a24)}
.topbar{height:44px;background:#0d1524;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid #1e2d49;gap:10px}
.logo{font-size:18px;font-weight:800;color:#7dd3ff;white-space:nowrap}.topinfo{font-family:Consolas,monospace;font-size:12px;color:#d7e8ff;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.body{flex:1;display:grid;grid-template-columns:158px 1fr 555px;gap:10px;padding:10px;min-height:0}.dock,.main,.side{background:rgba(11,16,32,.92);border:1px solid #1e2d49;border-radius:14px;box-shadow:0 12px 35px rgba(0,0,0,.35);min-height:0}.dock{padding:10px;overflow:auto}.dock-title{font-size:12px;color:#6ee7ff;font-weight:800;text-align:center;margin:4px 0 10px}.dock button,.btn{width:100%;border:0;border-radius:10px;background:var(--btn);color:var(--text);font-weight:700;padding:10px 8px;margin:4px 0;cursor:pointer}.dock button:hover,.btn:hover{background:var(--btn2)}.dock button.active{outline:2px solid var(--accent);background:#132a43}.main{display:flex;flex-direction:column;background:rgba(16,24,39,.95);overflow:hidden}.header{padding:14px 18px;border-bottom:1px solid #1e2d49;display:flex;align-items:center;justify-content:space-between;gap:10px}.title{font-size:26px;font-weight:800}.content{flex:1;overflow:auto;padding:14px}.status{background:#0d1524;color:var(--muted);font-family:Consolas,monospace;font-size:12px;padding:8px 12px;border-top:1px solid #1e2d49;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.side{display:flex;flex-direction:column;padding:12px;overflow:hidden}.side h3{margin:0 0 8px;color:#6ee7ff;font-size:14px;text-align:center}.screenwrap{display:flex;justify-content:center}.pixel-canvas{background:#05070b;border-radius:8px;border:1px solid #1e2d49;touch-action:none;image-rendering:pixelated;max-width:100%;height:auto}.output{height:190px;margin-top:10px;background:#05070b;color:var(--good);border:0;border-radius:10px;padding:10px;font-family:Consolas,monospace;resize:none;outline:none}.side-stats{font-family:Consolas,monospace;font-size:12px;color:#cbd5e1;white-space:pre-wrap;margin-top:8px;line-height:1.35}.card{background:var(--panel3);border:1px solid #27405f;border-radius:14px;padding:16px;margin:10px 0}.grid{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:12px}.appcard{background:#121b2e;border:1px solid #213753;border-radius:14px;padding:14px;min-height:96px}.appcard h3{margin:0;color:#6ee7ff}.appcard p{color:var(--muted);font-size:13px;min-height:34px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0}.smallbtn{width:auto;padding:9px 14px;margin:0}.input,.textarea,select{background:#05070b;color:#fff;border:1px solid #263a56;border-radius:10px;padding:10px;outline:none}.textarea{width:100%;min-height:130px;font-family:Consolas,monospace;resize:vertical}.input{min-width:230px}.mono{font-family:Consolas,monospace}.terminal,.logbox{background:#05070b;color:#44ff77;border-radius:10px;border:1px solid #263a56;padding:10px;font-family:Consolas,monospace;white-space:pre-wrap;overflow:auto}.terminal{height:330px}.logbox{height:260px}.bar{height:18px;background:#05070b;border:1px solid #263a56;border-radius:100px;overflow:hidden;margin:6px 0 12px}.fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--good));width:20%}.palette{display:grid;grid-template-columns:repeat(8,42px);gap:7px}.swatch{height:34px;border-radius:8px;border:1px solid #333;cursor:pointer;color:#000;font-weight:800}.file-list{width:260px;height:340px}.split{display:grid;grid-template-columns:280px 1fr;gap:12px}.gamepad{display:grid;grid-template-columns:60px 60px 60px;gap:8px;width:max-content;margin:10px 0}.gamepad button{height:48px}.pill{display:inline-block;border:1px solid #315072;border-radius:999px;padding:5px 10px;margin:3px;color:#d7e8ff;background:#0c1628;font-size:12px}.mobile-only{display:none}.canvas-big{--pixel:22px}.hidden{display:none!important}
@media(max-width:1050px){body{overflow:auto}.body{grid-template-columns:1fr;overflow:auto}.dock{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.dock button{margin:0}.side{order:2}.main{order:3}.mobile-only{display:inline-block}.topbar{height:auto;min-height:44px;align-items:flex-start;flex-direction:column;padding:8px 12px}.topinfo{text-align:left}.grid{grid-template-columns:1fr}.split{grid-template-columns:1fr}.file-list{width:100%;height:170px}.output{height:150px}.content{min-height:360px}.title{font-size:22px}}
@media(max-width:560px){.dock{grid-template-columns:repeat(2,1fr)}.palette{grid-template-columns:repeat(4,42px)}.input{min-width:100%;}.row{align-items:stretch}.row .smallbtn{width:100%}}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">JMD OS Web 2.0</div>
    <div class="topinfo" id="topInfo">Booting...</div>
  </div>
  <div class="body">
    <nav class="dock" id="dock"></nav>
    <main class="main">
      <div class="header"><div class="title" id="appTitle">Desktop</div><button class="btn smallbtn mobile-only" onclick="toggleFullscreen()">Fullscreen</button></div>
      <section class="content" id="content"></section>
      <div class="status" id="status">System ready.</div>
    </main>
    <aside class="side">
      <h3>VM DISPLAY</h3>
      <div class="screenwrap"><canvas id="screen" class="pixel-canvas" width="512" height="288"></canvas></div>
      <textarea id="output" class="output" readonly></textarea>
      <div class="side-stats" id="sideStats"></div>
    </aside>
  </div>
</div>
<script>
const VERSION='2.0 Web Edition';
const W=32,H=18;
const COLORS=['#05070b','#44ff77','#ff4d5e','#42c8ff','#ffe95c','#f5f7ff','#ff9f3d','#b46dff','#777f8f','#ff75c8','#39fff6','#ff45ff','#8b5a2b','#223dff','#0f8f4a','#ffd700'];
const FONT={
A:['111','101','111','101','101'],B:['110','101','110','101','110'],C:['111','100','100','100','111'],D:['110','101','101','101','110'],E:['111','100','110','100','111'],F:['111','100','110','100','100'],G:['111','100','101','101','111'],H:['101','101','111','101','101'],I:['111','010','010','010','111'],J:['001','001','001','101','111'],K:['101','101','110','101','101'],L:['100','100','100','100','111'],M:['101','111','111','101','101'],N:['101','111','111','111','101'],O:['111','101','101','101','111'],P:['111','101','111','100','100'],Q:['111','101','101','111','001'],R:['111','101','111','110','101'],S:['111','100','111','001','111'],T:['111','010','010','010','010'],U:['101','101','101','101','111'],V:['101','101','101','101','010'],W:['101','101','111','111','101'],X:['101','101','010','101','101'],Y:['101','101','010','010','010'],Z:['111','001','010','100','111'],
'0':['111','101','101','101','111'],'1':['010','110','010','010','111'],'2':['111','001','111','100','111'],'3':['111','001','111','001','111'],'4':['101','101','111','001','001'],'5':['111','100','111','001','111'],'6':['111','100','111','101','111'],'7':['111','001','001','001','001'],'8':['111','101','111','101','111'],'9':['111','101','111','001','111'],'!':['010','010','010','000','010'],'.':['000','000','000','000','010'],':':['000','010','000','010','000'],'-':['000','000','111','000','000'],'+':['000','010','111','010','000'],'/':['001','001','010','100','100'],'=':['000','111','000','111','000'],' ':['000','000','000','000','000']};
let state={app:'Desktop',start:Date.now(),ans:0,calcCount:0,lastKey:'',paintColor:1,antivirus:'Protected',music:false,game:null,ram:Array(4096).fill(0),pixels:Array.from({length:H},()=>Array(W).fill(0)),settings:{sound:true,typo:true,difficulty:'normal',bigPixels:false,theme:'blue',touch:true,fullscreen:false}};
let storage=loadStorage();
const canvas=document.getElementById('screen'),ctx=canvas.getContext('2d');
const output=document.getElementById('output');
const content=document.getElementById('content');
const appTitle=document.getElementById('appTitle');
const status=document.getElementById('status');
function defaultStorage(){return {files:{'welcome.txt':'Welcome to JMD Virtual PC Web 2.0.\nThis version works in a browser on PC, phone, and iPad.','system_log.txt':'JMD OS Web installed.\n','math_history.txt':''},paintSaves:{},quarantine:{},highscores:{dodge:0,snake:0,clicker:0},settings:null};}
function loadStorage(){try{let d=JSON.parse(localStorage.getItem('JMD_WEB_PC_2_0')||'null');return Object.assign(defaultStorage(),d||{});}catch(e){return defaultStorage();}}
function saveStorage(){storage.settings=state.settings;localStorage.setItem('JMD_WEB_PC_2_0',JSON.stringify(storage));}
function log(t){storage.files['system_log.txt']=(storage.files['system_log.txt']||'')+`[${new Date().toLocaleTimeString()}] ${t}\n`;saveStorage();}
function setStatus(t){status.textContent='  '+t;log(t);}
function write(t=''){output.value+=String(t)+'\n';output.scrollTop=output.scrollHeight;}
function clearOut(){output.value='';}
function setPixel(x,y,c){x=Math.floor(x);y=Math.floor(y);if(x>=0&&x<W&&y>=0&&y<H)state.pixels[y][x]=((Math.floor(c)%COLORS.length)+COLORS.length)%COLORS.length;}
function clearPixels(){state.pixels=Array.from({length:H},()=>Array(W).fill(0));}
function drawPixels(){let scale=canvas.width/W;ctx.fillStyle=COLORS[0];ctx.fillRect(0,0,canvas.width,canvas.height);for(let y=0;y<H;y++){for(let x=0;x<W;x++){ctx.fillStyle=COLORS[state.pixels[y][x]]||COLORS[5];ctx.fillRect(x*scale,y*scale,scale,scale);ctx.strokeStyle='#182033';ctx.strokeRect(x*scale,y*scale,scale,scale);}}}
function drawText(x,y,text,c){let cx=x;String(text).toUpperCase().split('').forEach(ch=>{let pat=FONT[ch]||FONT[' '];pat.forEach((row,ry)=>row.split('').forEach((b,rx)=>{if(b==='1')setPixel(cx+rx,y+ry,c)}));cx+=4;});}
function drawRect(x,y,w,h,c){for(let i=0;i<w;i++){setPixel(x+i,y,c);setPixel(x+i,y+h-1,c)}for(let i=0;i<h;i++){setPixel(x,y+i,c);setPixel(x+w-1,y+i,c)}}
function drawLine(x1,y1,x2,y2,c){x1|=0;y1|=0;x2|=0;y2|=0;let dx=Math.abs(x2-x1),dy=-Math.abs(y2-y1),sx=x1<x2?1:-1,sy=y1<y2?1:-1,err=dx+dy;while(true){setPixel(x1,y1,c);if(x1===x2&&y1===y2)break;let e2=2*err;if(e2>=dy){err+=dy;x1+=sx}if(e2<=dx){err+=dx;y1+=sy}}}
function drawCircle(cx,cy,r,c,filled=false){for(let y=cy-r;y<=cy+r;y++)for(let x=cx-r;x<=cx+r;x++){let d=(x-cx)**2+(y-cy)**2;if(filled?d<=r*r:d>=r*r-r&&d<=r*r+r)setPixel(x,y,c)}}
function bootScreen(){clearPixels();drawText(3,2,'JMD',3);drawText(3,9,'WEB 2.0',4);drawRect(0,0,W,H,2);drawPixels();write('JMD Virtual PC Web 2.0 booted.');write('This version works on PC, phone, iPad, Chromebook, and browser.');write('Storage uses browser localStorage.');}
function updateStats(){let used=state.ram.filter(x=>x!==0).length,upt=Math.floor((Date.now()-state.start)/1000);document.getElementById('topInfo').textContent=`App: ${state.app} | RAM: ${used}/4096 | Files: ${Object.keys(storage.files).length} | Uptime: ${upt}s | ${new Date().toLocaleTimeString()}`;document.getElementById('sideStats').textContent=`Current app: ${state.app}\nSoftware RAM: ${used}/4096\nAntivirus: ${state.antivirus}\nLast key: ${state.lastKey}\nANS: ${fmt(state.ans)}`;}
setInterval(updateStats,1000);
function dock(){const apps=['Desktop','Calc','Notes','Files','Terminal','Pixel Paint','Performance','Antivirus','Game Center','Music','Demos','Settings','About'];let d=document.getElementById('dock');d.innerHTML='<div class="dock-title">APPS</div>';apps.forEach(a=>{let b=document.createElement('button');b.textContent=a;b.className=state.app===a?'active':'';b.onclick=()=>openApp(a);d.appendChild(b)});}
function openApp(a){state.app=a;state.music=false;if(state.game&&state.game.timer)clearInterval(state.game.timer);state.game=null;appTitle.textContent=a;content.innerHTML='';dock();setStatus('Opened '+a);({Desktop:desktop,Calc:calc,Notes:notes,Files:files,Terminal:terminal,'Pixel Paint':paint,Performance:performance,Antivirus:antivirus,'Game Center':gameCenter,Music:music,Demos:demos,Settings:settings,About:about}[a]||desktop)();updateStats();}
function desktop(){clearPixels();drawText(2,2,'JMD OS',3);drawText(2,9,'DESKTOP',4);drawRect(0,0,W,H,5);drawPixels();content.innerHTML=`<div class="card"><h2>Welcome to JMD Virtual PC Web 2.0</h2><p>This is the browser/mobile edition. It runs from one HTML file and saves data in the browser.</p><span class="pill">Mobile</span><span class="pill">iPad</span><span class="pill">Desktop</span><span class="pill">Touch</span><span class="pill">No .exe needed</span></div><div class="grid" id="shortcuts"></div>`;let s=document.getElementById('shortcuts');[['Calc','English math engine'],['Antivirus','Virtual threat scanner'],['Game Center','Dodge, Snake, Pong, Clicker'],['Music','Beep music + visualizer'],['Pixel Paint','Touch/click drawing'],['Performance','System stats'],['Terminal','Command control'],['Settings','Fullscreen + display options']].forEach(([n,d])=>s.innerHTML+=`<div class="appcard"><h3>${n}</h3><p>${d}</p><button class="btn smallbtn" onclick="openApp('${n}')">Open</button></div>`);}
function fmt(v){return (typeof v==='number'&&isFinite(v)&&Math.abs(v-Math.round(v))<1e-9)?String(Math.round(v)):String(Math.round(v*1e10)/1e10)}
const small={zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,nineteen:19};
const tens={twenty:20,thirty:30,forty:40,fifty:50,sixty:60,seventy:70,eighty:80,ninety:90};
const ops={plus:'+',add:'+',minus:'-',subtract:'-',times:'*',time:'*',multiply:'*',multiplied:'*',x:'*',divide:'/',divided:'/',over:'/',mod:'%',modulo:'%',power:'**',pow:'**'};
const fillers=new Set('what is are the answer to please calculate calc solve find me can you for by of equals equal make it would be than then and a an with using show tell does'.split(' '));
const known=new Set([...Object.keys(small),...Object.keys(tens),'hundred','thousand','million','billion','trillion',...Object.keys(ops),'sqrt','root','squareroot','absolute','abs','round','floor','ceil','ceiling','sin','cos','tan','log','log10','squared','cubed','percent','percentage','pi','e','point','negative','ans',...fillers]);
function closeWord(w){if(!state.settings.typo||known.has(w)||/^\d+(\.\d+)?$/.test(w)||w.length<3)return w;let best=w,score=0;known.forEach(k=>{let s=similar(w,k);if(s>score){score=s;best=k}});return score>.72?best:w}
function similar(a,b){let m=Array(a.length+1).fill(0).map(()=>Array(b.length+1).fill(0));for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)m[i][j]=a[i-1]===b[j-1]?m[i-1][j-1]+1:Math.max(m[i-1][j],m[i][j-1]);return m[a.length][b.length]/Math.max(a.length,b.length)}
function tokens(text){text=text.toLowerCase().replace(/×/g,' times ').replace(/÷/g,' divided ').replace(/\^/g,' power ').replace(/\*\*/g,' power ').replace(/\+/g,' plus ').replace(/-/g,' minus ').replace(/\*/g,' times ').replace(/\//g,' divided ').replace(/%/g,' percent ').replace(/=/g,' = ').replace(/([0-9])x([0-9])/g,'$1 times $2').replace(/[^a-z0-9.=]+/g,' ').replace(/\s+/g,' ').trim();return text.split(' ').filter(Boolean).map(closeWord)}
function wordNum(t,i){let total=0,cur=0,used=false,dec=false,digits=[],sign=1;if(t[i]==='negative'){sign=-1;i++}while(i<t.length){let w=t[i];if(small[w]!=null){dec?digits.push(String(small[w])):cur+=small[w];used=true;i++}else if(tens[w]!=null){dec?digits.push(String(tens[w])):cur+=tens[w];used=true;i++}else if(w==='point'){dec=true;used=true;i++}else if(w==='hundred'){if(cur===0)cur=1;cur*=100;used=true;i++}else if(['thousand','million','billion','trillion'].includes(w)){let sc={thousand:1e3,million:1e6,billion:1e9,trillion:1e12}[w];if(cur===0)cur=1;total+=cur*sc;cur=0;used=true;i++}else break}if(!used)return[null,i];let n=total+cur;if(digits.length)n=parseFloat(n+'.'+digits.join(''));return[sign*n,i]}
function translate(side){let t=tokens(side),e=[];for(let i=0;i<t.length;){let w=t[i],num=wordNum(t,i);if(num[0]!=null){e.push(String(num[0]));i=num[1];continue}if(/^\d+(\.\d+)?$/.test(w)){e.push(w);i++;continue}if(w==='pi'){e.push('Math.PI');i++;continue}if(w==='e'){e.push('Math.E');i++;continue}if(w==='ans'){e.push(String(state.ans));i++;continue}if(ops[w]){e.push(ops[w]);i++;continue}if(w==='squared'){e.push('**2');i++;continue}if(w==='cubed'){e.push('**3');i++;continue}if(w==='percent'||w==='percentage'){let last=e.pop()||'0';if(t[i+1]==='of'){e.push(`((${last})/100)*`);i+=2}else{e.push(`((${last})/100)`);i++}continue}if(['sqrt','root','squareroot'].includes(w)){let [n,ni]=wordNum(t,i+1);if(t[i+1]==='of')[n,ni]=wordNum(t,i+2);if(n!=null){e.push(`Math.sqrt(${n})`);i=ni}else{i++;}continue}if(['abs','absolute'].includes(w)){let [n,ni]=wordNum(t,i+1);if(n!=null){e.push(`Math.abs(${n})`);i=ni}else{i++;}continue}if(fillers.has(w)){i++;continue}i++}let expr=e.join(' ').trim();if(!expr)throw Error('I could not find a math problem.');return expr}
function safeEval(expr){if(!/^[0-9+\-*/%().,\sMathPIEabsqrtceilfloorroundminmax]*$/.test(expr))throw Error('Blocked unsafe expression.');return Function('return ('+expr+')')()}
function solveMath(text){let cleaned=text.toLowerCase().replace(/=/g,' = ');let left=text,right=null;if(cleaned.includes('=')){let p=text.split('=');left=p[0];right=p.slice(1).join('=')}let le=translate(left),lv=safeEval(le);if(right==null)return{mode:'solve',expr:le,val:lv};let re=translate(right),rv=safeEval(re);return{mode:'check',le,re,lv,rv,correct:Math.abs(lv-rv)<1e-9}}
function calc(){clearPixels();drawText(2,2,'CALC',3);drawText(2,9,'ENG',4);drawRect(0,0,W,H,3);drawPixels();content.innerHTML=`<h2>English Calculator Pro</h2><p>Type math in normal words. It handles typos, equations, percent, roots, powers, and ANS.</p><textarea class="textarea" id="calcIn">5 times 3 = 15</textarea><div class="row"><button class="btn smallbtn" onclick="doCalc()">Calculate</button><button class="btn smallbtn" onclick="demoCalc()">Demo</button><button class="btn smallbtn" onclick="clearCalcHistory()">Clear History</button></div><div class="logbox" id="calcOut">${storage.files['math_history.txt']||''}</div>`;}
function demoCalc(){document.getElementById('calcIn').value='what is square root of 144 plus 13'}
function doCalc(){let text=document.getElementById('calcIn').value.trim(),out=document.getElementById('calcOut');try{let r=solveMath(text);state.calcCount++;let msg=`\nINPUT: ${text}\n`;clearPixels();if(r.mode==='solve'){state.ans=r.val;msg+=`TRANSLATED: ${r.expr}\nANSWER: ${fmt(r.val)}\n`;drawText(2,2,'ANS',1);drawText(2,9,fmt(r.val).slice(0,7),4);drawRect(0,0,W,H,1)}else{state.ans=r.lv;msg+=`LEFT: ${r.le} = ${fmt(r.lv)}\nRIGHT: ${r.re} = ${fmt(r.rv)}\nCHECK: ${r.correct?'TRUE / CORRECT':'FALSE / WRONG'}\n`;drawText(2,2,r.correct?'TRUE':'FALSE',r.correct?1:2);drawText(2,9,r.correct?'OK':'NO',4);drawRect(0,0,W,H,r.correct?1:2)}drawPixels();out.textContent+=msg;out.scrollTop=out.scrollHeight;storage.files['math_history.txt']=out.textContent;saveStorage();setStatus('Calculator ran.')}catch(e){out.textContent+='\nERROR: '+e.message+'\n';clearPixels();drawText(2,2,'ERROR',2);drawText(2,9,'TRY',4);drawRect(0,0,W,H,2);drawPixels();}}
function clearCalcHistory(){storage.files['math_history.txt']='';saveStorage();document.getElementById('calcOut').textContent=''}
function notes(){clearPixels();drawText(2,2,'NOTE',3);drawText(2,9,'APP',4);drawRect(0,0,W,H,5);drawPixels();content.innerHTML=`<h2>Notes</h2><div class="row"><input class="input" id="noteName" value="notes.txt"><button class="btn smallbtn" onclick="saveNote()">Save</button><button class="btn smallbtn" onclick="openNote()">Open</button><button class="btn smallbtn" onclick="deleteNote()">Delete</button></div><textarea class="textarea" id="noteText" style="min-height:350px">${storage.files['notes.txt']||''}</textarea>`;}
function saveNote(){let n=document.getElementById('noteName').value||'notes.txt';storage.files[n]=document.getElementById('noteText').value;saveStorage();setStatus('Saved '+n)}function openNote(){let n=document.getElementById('noteName').value||'notes.txt';document.getElementById('noteText').value=storage.files[n]||'';setStatus('Opened '+n)}function deleteNote(){let n=document.getElementById('noteName').value;if(n&&n!=='system_log.txt'){delete storage.files[n];saveStorage();setStatus('Deleted '+n)}}
function files(){clearPixels();drawText(2,2,'FILES',3);drawText(2,9,String(Object.keys(storage.files).length),4);drawRect(0,0,W,H,3);drawPixels();content.innerHTML=`<h2>Files</h2><div class="split"><select class="input file-list" id="fileList" size="12">${Object.keys(storage.files).sort().map(n=>`<option>${n}</option>`).join('')}</select><div><div class="row"><button class="btn smallbtn" onclick="viewFile()">Open</button><button class="btn smallbtn" onclick="removeFile()">Delete</button><button class="btn smallbtn" onclick="downloadFile()">Download</button></div><textarea class="textarea" id="fileView" style="min-height:320px"></textarea></div></div>`;}
function getSelectedFile(){let l=document.getElementById('fileList');return l&&l.value}function viewFile(){let n=getSelectedFile();document.getElementById('fileView').value=storage.files[n]||''}function removeFile(){let n=getSelectedFile();if(n&&n!=='system_log.txt'){delete storage.files[n];saveStorage();files()}}function downloadFile(){let n=getSelectedFile();if(!n)return;downloadText(n,storage.files[n]||'')}
function terminal(){clearPixels();drawText(2,2,'TERM',3);drawText(2,9,'READY',4);drawRect(0,0,W,H,1);drawPixels();content.innerHTML=`<h2>Terminal</h2><div class="terminal" id="termOut">JMD Terminal ready. Type help.</div><div class="row"><span class="mono">&gt;</span><input class="input" id="termIn" style="flex:1" autofocus><button class="btn smallbtn" onclick="runTerm()">Run</button></div>`;document.getElementById('termIn').addEventListener('keydown',e=>{if(e.key==='Enter')runTerm()});}
function termPrint(t){let o=document.getElementById('termOut');o.textContent+='\n'+t;o.scrollTop=o.scrollHeight}
function runTerm(){let i=document.getElementById('termIn'),cmd=i.value.trim();i.value='';termPrint('> '+cmd);let l=cmd.toLowerCase();if(l==='help')termPrint('help, apps, open calc, files, perf, scan, calc five times three, ram, ramset 0 99, ramget 0, clear, reboot');else if(l==='clear')document.getElementById('termOut').textContent='';else if(l==='apps')termPrint('Desktop, Calc, Notes, Files, Terminal, Pixel Paint, Performance, Antivirus, Game Center, Music, Demos, Settings, About');else if(l.startsWith('open ')){let a=cmd.slice(5).trim().toLowerCase();let map={calc:'Calc',calculator:'Calc',files:'Files',notes:'Notes',paint:'Pixel Paint',performance:'Performance',perf:'Performance',antivirus:'Antivirus',game:'Game Center',games:'Game Center',music:'Music',demos:'Demos',settings:'Settings',about:'About'};map[a]?openApp(map[a]):termPrint('App not found.')}else if(l==='files')termPrint(Object.keys(storage.files).join('\n'));else if(l==='perf')termPrint(perfText());else if(l==='scan')termPrint(scanThreats().join('\n')||'No threats found.');else if(l.startsWith('calc ')){try{let r=solveMath(cmd.slice(5));termPrint(r.mode==='solve'?`${r.expr} = ${fmt(r.val)}`:`${fmt(r.lv)} == ${fmt(r.rv)} -> ${r.correct}`)}catch(e){termPrint('Calc error: '+e.message)}}else if(l==='ram')termPrint(`Software RAM: ${state.ram.filter(x=>x!==0).length}/4096\n`+JSON.stringify(state.ram.slice(0,32)));else if(l.startsWith('ramset ')){let p=l.split(' ');state.ram[+p[1]]=+p[2];termPrint(`RAM[${p[1]}] = ${p[2]}`)}else if(l.startsWith('ramget ')){let p=l.split(' ');termPrint(`RAM[${p[1]}] = ${state.ram[+p[1]]}`)}else if(l==='reboot'){bootScreen();openApp('Desktop')}else termPrint('Unknown command. Type help.')}
function paint(){content.innerHTML=`<h2>Pixel Paint Pro</h2><p>Click/drag on the VM display. Works with touch on phones/tablets.</p><div class="palette">${COLORS.map((c,i)=>`<button class="swatch" style="background:${c};color:${[1,3,4,5,10,15].includes(i)?'#000':'#fff'}" onclick="state.paintColor=${i};setStatus('Paint color ${i}')">${i}</button>`).join('')}</div><div class="row"><input class="input" id="paintName" value="paint1"><button class="btn smallbtn" onclick="savePaint()">Save</button><button class="btn smallbtn" onclick="loadPaint()">Load</button><button class="btn smallbtn" onclick="clearPixels();drawPixels()">Clear</button></div>`;setStatus('Pixel Paint ready.');}
function pointerPaint(e){if(state.app!=='Pixel Paint')return;let r=canvas.getBoundingClientRect(),x=Math.floor((e.clientX-r.left)/r.width*W),y=Math.floor((e.clientY-r.top)/r.height*H);setPixel(x,y,state.paintColor);drawPixels();e.preventDefault()}
let down=false;canvas.addEventListener('pointerdown',e=>{down=true;pointerPaint(e)});canvas.addEventListener('pointermove',e=>{if(down)pointerPaint(e)});window.addEventListener('pointerup',()=>down=false);
function savePaint(){let n=document.getElementById('paintName').value||'paint1';storage.paintSaves[n]=state.pixels;saveStorage();setStatus('Saved '+n)}function loadPaint(){let n=document.getElementById('paintName').value||'paint1';if(storage.paintSaves[n]){state.pixels=storage.paintSaves[n];drawPixels();setStatus('Loaded '+n)}}
function perfText(){let ram=state.ram.filter(x=>x!==0).length,chars=Object.values(storage.files).join('').length,cpu=Math.min(99,10+state.app.length*3+Math.floor(Math.random()*15)),stor=Math.min(100,Math.floor(chars/200));return `JMD PERFORMANCE READER PRO\n--------------------------\nCurrent app: ${state.app}\nUptime: ${Math.floor((Date.now()-state.start)/1000)}s\nSoftware CPU: ${cpu}%\nSoftware RAM: ${ram}/4096\nVirtual storage: ${chars} chars (${stor}%)\nFiles: ${Object.keys(storage.files).length}\nPaint saves: ${Object.keys(storage.paintSaves).length}\nCalculations: ${state.calcCount}\nAntivirus: ${state.antivirus}\nANS: ${fmt(state.ans)}`}
function performance(){content.innerHTML=`<h2>Performance Reader Pro</h2><div class="logbox" id="perfBox"></div><button class="btn smallbtn" onclick="performance()">Refresh</button>`;document.getElementById('perfBox').textContent=perfText();clearPixels();drawText(2,2,'PERF',3);drawText(2,9,'GOOD',state.antivirus==='Protected'?1:2);drawRect(0,0,W,H,3);drawPixels();}
function scanThreats(){let words=['virus','malware','trojan','worm','ransom','delete system','steal data','corrupt','disable antivirus','hack'];let threats=[];Object.entries(storage.files).forEach(([n,c])=>{let s=String(c).toLowerCase();words.forEach(w=>{if(s.includes(w))threats.push(`[${w==='virus'?'LOW':'HIGH'}] ${n} contains "${w}"`)})});state.ram.forEach((v,i)=>{if(String(v).toLowerCase().includes('virus'))threats.push(`[MEDIUM] RAM[${i}] suspicious`)}) ;return threats;}
function antivirus(){clearPixels();drawText(2,2,'ANTI',3);drawText(2,9,'VIRUS',4);drawRect(0,0,W,H,state.antivirus==='Protected'?1:2);drawPixels();content.innerHTML=`<h2>JMD Antivirus 2.0 Web</h2><div class="row"><button class="btn smallbtn" onclick="doScan()">Quick Scan</button><button class="btn smallbtn" onclick="cleanThreats()">Clean Threats</button><button class="btn smallbtn" onclick="makeTestThreat()">Make Test Threat</button></div><div class="logbox" id="avOut">Antivirus ready. Status: ${state.antivirus}</div>`;}
function doScan(){let t=scanThreats(),o=document.getElementById('avOut');o.textContent+='\nScan complete. Files: '+Object.keys(storage.files).length+' RAM: 4096\n';if(t.length){state.antivirus='Threats Found';o.textContent+=t.join('\n')+'\n'}else{state.antivirus='Protected';o.textContent+='No threats found.\n'}updateStats();}
function cleanThreats(){let words=['virus','malware','trojan','worm','ransom','delete system','steal data','corrupt','disable antivirus','hack'],c=0;Object.keys(storage.files).forEach(n=>{let s=String(storage.files[n]).toLowerCase();if(words.some(w=>s.includes(w))){storage.quarantine[n]=storage.files[n];storage.files[n]='[QUARANTINED BY JMD ANTIVIRUS]';c++}});state.antivirus='Protected';saveStorage();document.getElementById('avOut').textContent+=`\nCleaned/quarantined: ${c}\n`;}
function makeTestThreat(){storage.files['test_threat.txt']='this contains a fake virus for antivirus testing';saveStorage();document.getElementById('avOut').textContent+='\nCreated test_threat.txt\n'}
function gameCenter(){content.innerHTML=`<h2>Game Center</h2><div class="grid"><div class="appcard"><h3>Pixel Dodge</h3><p>Dodge red blocks.</p><button class="btn smallbtn" onclick="startDodge()">Play</button></div><div class="appcard"><h3>Snake</h3><p>Classic snake.</p><button class="btn smallbtn" onclick="startSnake()">Play</button></div><div class="appcard"><h3>Pong</h3><p>Mini paddle game.</p><button class="btn smallbtn" onclick="startPong()">Play</button></div><div class="appcard"><h3>Clicker</h3><p>Earn virtual coins.</p><button class="btn smallbtn" onclick="startClicker()">Play</button></div></div><div id="gameUI" class="card">Pick a game.</div>`;clearPixels();drawText(2,2,'GAME',3);drawText(2,9,'CENTER',4);drawRect(0,0,W,H,2);drawPixels();}
function gameLoop(fn,ms=120){if(state.game&&state.game.timer)clearInterval(state.game.timer);state.game={timer:setInterval(fn,ms)};}
function startDodge(){let x=16,score=0,en=[];document.getElementById('gameUI').innerHTML='<h3>Pixel Dodge</h3><p>Use A/D or arrows.</p>';gameLoop(()=>{if(Math.random()<.28)en.push([Math.floor(Math.random()*W),0]);en.forEach(e=>e[1]++);en=en.filter(e=>e[1]<H);if(en.some(e=>e[1]===H-2&&e[0]===x)){clearInterval(state.game.timer);storage.highscores.dodge=Math.max(storage.highscores.dodge,score);saveStorage();setStatus('Game over score '+score);drawText(2,2,'GAME',2);drawText(2,9,'OVER',4);drawPixels();return}score++;document.getElementById('gameUI').innerHTML=`<h3>Pixel Dodge</h3><p>Score: ${score} High: ${storage.highscores.dodge||0}</p>`;clearPixels();en.forEach(e=>setPixel(e[0],e[1],2));setPixel(x,H-2,1);drawRect(0,0,W,H,5);drawPixels();state.game.move=(dir)=>{x=Math.max(0,Math.min(W-1,x+dir))}},120)}
function startSnake(){let snake=[[10,8]],dir=[1,0],food=[20,8],score=0;document.getElementById('gameUI').innerHTML='<h3>Snake</h3><p>Use WASD or arrows.</p>';state.gameMove=(d)=>{dir=d};gameLoop(()=>{let h=[snake[0][0]+dir[0],snake[0][1]+dir[1]];if(h[0]<0||h[0]>=W||h[1]<0||h[1]>=H||snake.some(s=>s[0]===h[0]&&s[1]===h[1])){clearInterval(state.game.timer);storage.highscores.snake=Math.max(storage.highscores.snake,score);saveStorage();setStatus('Snake game over '+score);return}snake.unshift(h);if(h[0]===food[0]&&h[1]===food[1]){score++;food=[Math.floor(Math.random()*W),Math.floor(Math.random()*H)]}else snake.pop();document.getElementById('gameUI').innerHTML=`<h3>Snake</h3><p>Score: ${score} High: ${storage.highscores.snake||0}</p>`;clearPixels();snake.forEach(s=>setPixel(s[0],s[1],1));setPixel(food[0],food[1],4);drawRect(0,0,W,H,5);drawPixels();},140)}
function startPong(){let py=8,ai=8,bx=16,by=8,vx=1,vy=1,score=0;state.gameMove=d=>{py=Math.max(2,Math.min(H-3,py+d))};gameLoop(()=>{bx+=vx;by+=vy;if(by<=1||by>=H-2)vy*=-1;if(bx===2&&Math.abs(by-py)<=2){vx=1;score++}if(bx===W-3&&Math.abs(by-ai)<=2)vx=-1;if(by>ai)ai++;else if(by<ai)ai--;if(bx<0||bx>=W){clearInterval(state.game.timer);setStatus('Pong over score '+score);return}document.getElementById('gameUI').innerHTML=`<h3>Pong</h3><p>Score: ${score}. Use W/S or arrows.</p>`;clearPixels();for(let i=-2;i<=2;i++){setPixel(1,py+i,1);setPixel(W-2,ai+i,2)}setPixel(bx,by,4);drawRect(0,0,W,H,5);drawPixels();},100)}
function startClicker(){let coins=+(localStorage.getItem('jmd_clicker')||0);content.querySelector('#gameUI').innerHTML=`<h3>Clicker</h3><p id="coins">Coins: ${coins}</p><button class="btn smallbtn" id="clickerBtn">Click +1</button>`;document.getElementById('clickerBtn').onclick=()=>{coins++;localStorage.setItem('jmd_clicker',coins);document.getElementById('coins').textContent='Coins: '+coins;clearPixels();drawText(2,2,'COINS',4);drawText(2,9,String(coins).slice(0,7),1);drawPixels()}}
window.addEventListener('keydown',e=>{state.lastKey=e.key;if(state.app==='Game Center'&&state.game){if(state.game.move){if(['ArrowLeft','a','A'].includes(e.key))state.game.move(-1);if(['ArrowRight','d','D'].includes(e.key))state.game.move(1)}if(state.gameMove){if(['ArrowUp','w','W'].includes(e.key))state.gameMove([0,-1]);if(['ArrowDown','s','S'].includes(e.key))state.gameMove([0,1]);if(['ArrowLeft','a','A'].includes(e.key))state.gameMove([-1,0]);if(['ArrowRight','d','D'].includes(e.key))state.gameMove([1,0])}}});
function beep(){if(!state.settings.sound)return;let a=new (window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=440+Math.random()*300;g.gain.value=.05;o.start();setTimeout(()=>{o.stop();a.close()},100)}
function music(){content.innerHTML=`<h2>Music Studio</h2><p>Browser beep music with visualizer.</p><div class="row"><button class="btn smallbtn" onclick="playMusic('Calm')">Calm</button><button class="btn smallbtn" onclick="playMusic('Battle')">Battle</button><button class="btn smallbtn" onclick="playMusic('Hacker')">Hacker</button><button class="btn smallbtn" onclick="state.music=false">Stop</button></div><div class="logbox" id="musicOut">Pick a song.</div>`;clearPixels();drawText(2,2,'MUSIC',3);drawText(2,9,'APP',4);drawRect(0,0,W,H,7);drawPixels();}
function playMusic(song){state.music=true;document.getElementById('musicOut').textContent='Playing: '+song;let token=Date.now();state.musicToken=token;(function loop(i=0){if(!state.music||state.musicToken!==token||state.app!=='Music')return;beep();clearPixels();let color={Calm:3,Battle:2,Hacker:10}[song]||3;for(let x=0;x<W;x++){let h=1+Math.floor(Math.random()*(H-3));for(let y=H-1;y>H-h;y--)setPixel(x,y,color)}drawText(2,2,'PLAY',5);drawPixels();setTimeout(()=>loop(i+1),260)})()}
function demos(){content.innerHTML=`<h2>Old Demos</h2><div class="row"><button class="btn smallbtn" onclick="demoRandom()">Random Dots</button><button class="btn smallbtn" onclick="demoGraphics()">Graphics</button><button class="btn smallbtn" onclick="bootScreen()">Boot Screen</button><button class="btn smallbtn" onclick="demoRam()">RAM Test</button></div>`;}
function demoRandom(){clearPixels();let i=0,t=setInterval(()=>{for(let j=0;j<16;j++)setPixel(Math.random()*W,Math.random()*H,1+Math.random()*15);drawPixels();if(++i>80)clearInterval(t)},35)}function demoGraphics(){clearPixels();drawLine(0,0,W-1,H-1,2);drawLine(0,H-1,W-1,0,4);drawCircle(16,9,6,10,false);drawCircle(16,9,3,6,true);drawText(2,2,'GFX',3);drawRect(0,0,W,H,5);drawPixels()}function demoRam(){for(let i=0;i<64;i++)state.ram[i]=i*5;clearPixels();drawText(2,2,'RAM',3);drawText(2,9,'OK',1);drawRect(0,0,W,H,4);drawPixels();setStatus('Software RAM test wrote slots 0-63.')}
function settings(){content.innerHTML=`<h2>Settings</h2><div class="card"><label><input type="checkbox" id="setSound" ${state.settings.sound?'checked':''}> Sound on</label><br><label><input type="checkbox" id="setTypo" ${state.settings.typo?'checked':''}> Typo correction on</label><br><label><input type="checkbox" id="setBig" ${state.settings.bigPixels?'checked':''}> Bigger display</label><br><label><input type="checkbox" id="setTouch" ${state.settings.touch?'checked':''}> Touch/mobile mode</label><br><br><label>Game difficulty <select id="setDiff"><option>easy</option><option>normal</option><option>hard</option></select></label><br><br><button class="btn smallbtn" onclick="applySettings()">Apply</button><button class="btn smallbtn" onclick="toggleFullscreen()">Toggle Fullscreen</button><button class="btn smallbtn" onclick="resetSystem()">Reset Stored Data</button></div>`;document.getElementById('setDiff').value=state.settings.difficulty;}
function applySettings(){state.settings.sound=document.getElementById('setSound').checked;state.settings.typo=document.getElementById('setTypo').checked;state.settings.bigPixels=document.getElementById('setBig').checked;state.settings.touch=document.getElementById('setTouch').checked;state.settings.difficulty=document.getElementById('setDiff').value;canvas.width=state.settings.bigPixels?704:512;canvas.height=state.settings.bigPixels?396:288;drawPixels();saveStorage();setStatus('Settings applied.')}function toggleFullscreen(){if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.()}function resetSystem(){if(confirm('Reset all JMD Web PC storage?')){localStorage.removeItem('JMD_WEB_PC_2_0');location.reload()}}
function about(){content.innerHTML=`<h2>About JMD Virtual PC Web 2.0</h2><div class="card"><p>This is a browser edition of JMD Virtual PC. It works as one HTML file and runs on PC, phone, iPad, Chromebook, and most modern browsers.</p><p>It includes software RAM, local browser storage, apps, games, music, antivirus, performance reader, terminal, files, notes, paint, and an English calculator.</p><p>To publish it, send this HTML file or host it on GitHub Pages/Netlify/your own site.</p></div>`;clearPixels();drawText(2,2,'JMD',3);drawText(2,9,'WEB',4);drawRect(0,0,W,H,5);drawPixels();}
function downloadText(name,text){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'}));a.download=name;a.click();URL.revokeObjectURL(a.href)}
function exportHTML(){downloadText('JMD_Virtual_PC_Web_2_0.html',document.documentElement.outerHTML)}
// init settings from storage
if(storage.settings)state.settings=Object.assign(state.settings,storage.settings);
dock();bootScreen();openApp('Desktop');updateStats();
</script>
</body>
</html>
